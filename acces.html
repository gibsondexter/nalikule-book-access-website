<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Payment Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    width: 90%;
    max-width: 800px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.card {
    background: #eee;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    cursor: pointer;
}

.approve {
    background: green;
    color: white;
}

.reject {
    background: red;
    color: white;
}
</style>
</head>

<body>

<header>
    <h1>Admin Payment Dashboard</h1>
</header>

<div class="container">

    <h2>Pending Payments</h2>
    <div id="payments"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyASE0IKRHGqjHdxOxBovD4n5FqDm_KAukA",
  authDomain: "nalikule-college-books.firebaseapp.com",
  projectId: "nalikule-college-books",
  storageBucket: "nalikule-college-books.appspot.com",
  messagingSenderId: "726295406083",
  appId: "1:726295406083:web:d0b732575478cbf66a1036"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const container = document.getElementById("payments");


// LOAD PAYMENTS
function loadPayments() {

    db.collection("payments")
    .where("status", "==", "pending")
    .get()
    .then(snapshot => {

        container.innerHTML = "";

        if (snapshot.empty) {
            container.innerHTML = "<p>No pending payments</p>";
            return;
        }

        snapshot.forEach(doc => {
            let data = doc.data();

            container.innerHTML += `
                <div class="card">
                    <p><b>Name:</b> ${data.name}</p>
                    <p><b>Reg Number:</b> ${data.regNumber}</p>
                    <p><b>Transaction ID:</b> ${data.transactionId}</p>

                    <button class="approve" onclick="approve('${doc.id}')">Approve</button>
                    <button class="reject" onclick="reject('${doc.id}')">Reject</button>
                </div>
            `;
        });

    });
}


// APPROVE PAYMENT
function approve(id) {

    let now = new Date();

    // 48 hours from now
    let expiresAt = new Date(now.getTime() + (48 * 60 * 60 * 1000));

    db.collection("payments").doc(id).update({
        status: "approved",
        access: "time_limited",
        approvedAt: now,
        expiresAt: expiresAt
    });

    alert("Payment Approved! User has 48 hours access.");
    loadPayments();
}


// REJECT PAYMENT
function reject(id) {
    db.collection("payments").doc(id).update({
        status: "rejected",
        access: "none"
    });

    alert("Payment Rejected!");
    loadPayments();
}


// INITIAL LOAD
loadPayments();

</script>

</body>
</html>
