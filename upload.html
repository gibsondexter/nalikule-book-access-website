<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Upload</title>

<style>
body { font-family: Arial; background:#f4f6f9; }

.container {
    width:90%;
    max-width:600px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input, select, button {
    width:100%;
    padding:10px;
    margin:10px 0;
}

button {
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

#status {
    text-align:center;
    font-weight:bold;
}
    <a href="primary.html" style="
    display:inline-block;
    padding:12px 20px;
    background:#004080;
    color:white;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
    margin:10px;
">
    Primary Upload
</a>
    <a href="secondary.html" style="
    display:inline-block;
    padding:12px 20px;
    background:#004080;
    color:white;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
    margin:10px;
">
    Secondary Upload
</a>

        Check Pending Payments
    </a>
</div>

<select id="program">
    <option>MAT/COM</option>
    <option>MAT/BIO</option>
    <option>MAT/PHY</option>
    <option>MAT/AGR</option>
    <option>MAT/CHEM</option>
    <option>MAT/HEC</option>
    <option>BIO/HEC</option>
    <option>AGR/BIO</option>
    <option>AGR/HEC</option>
    <option>ENG/LAL</option>
    
</select>

<select id="year">
    <option>Year 1</option>
    <option>Year 2</option>
    <option>Year 3</option>
    <option>Year 4</option>
</select>

<select id="semester">
    <option>Semester 1</option>
    <option>Semester 2</option>
</select>

<input type="text" id="title" placeholder="Material Title">

<input type="file" id="file">

<input type="text" id="link" placeholder="OR paste Google Drive link">

<button onclick="upload()">Upload Material</button>

<p id="status"></p>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyASE0IKRHGqjHdxOxBovD4n5FqDm_KAukA",
    authDomain: "nalikule-college-books.firebaseapp.com",
    projectId: "nalikule-college-books",
    storageBucket: "nalikule-college-books.appspot.com",
    messagingSenderId: "726295406083",
    appId: "1:726295406083:web:eaf13bfb0bfe59316a1036"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

function upload() {

    let program = document.getElementById("program").value.trim();
    let year = document.getElementById("year").value.trim();
    let semester = document.getElementById("semester").value.trim();
    let title = document.getElementById("title").value.trim();
    let file = document.getElementById("file").files[0];
    let link = document.getElementById("link").value.trim();

    let status = document.getElementById("status");

    if (!title) {
        alert("Enter title!");
        return;
    }

    // disable button during upload
    document.querySelector("button").disabled = true;

    // =========================
    // FILE UPLOAD
    // =========================
    if (file) {

        let fileName = Date.now() + "_" + file.name; // prevent overwrite
        let storageRef = storage.ref("materials/" + fileName);

        let uploadTask = storageRef.put(file);

        uploadTask.on("state_changed",

            function(snapshot) {
                let progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                status.innerHTML = "Uploading: " + progress.toFixed(0) + "%";
            },

            function(error) {
                status.innerHTML = "❌ Upload failed!";
                alert(error.message);
                document.querySelector("button").disabled = false;
            },

            function() {
                uploadTask.snapshot.ref.getDownloadURL().then(function(url) {

                    saveToFirestore(program, year, semester, title, url);

                });
            }
        );
    }

    // =========================
    // GOOGLE DRIVE LINK
    // =========================
    else if (link) {

        saveToFirestore(program, year, semester, title, link);
    }

    else {
        alert("Select file or paste link!");
        document.querySelector("button").disabled = false;
    }
}

// SAVE TO FIRESTORE
function saveToFirestore(program, year, semester, title, link) {

    let status = document.getElementById("status");

    db.collection("materials").add({
        program: program,
        year: year,
        semester: semester,
        title: title,
        link: link,
        createdAt: new Date()
    })
    .then(() => {

        status.innerHTML = "✅ Uploaded successfully!";

        // reset form
        document.getElementById("title").value = "";
        document.getElementById("file").value = "";
        document.getElementById("link").value = "";

        document.querySelector("button").disabled = false;

    })
    .catch(err => {
        status.innerHTML = "❌ Failed to save!";
        alert(err.message);
        document.querySelector("button").disabled = false;
    });
}

</script>
</body>
</html>
</body>
</html>
