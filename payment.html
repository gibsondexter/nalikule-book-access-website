<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Portal</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

header {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    width: 90%;
    max-width: 500px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}

.info {
    background: #eee;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<header>
    <h1>Student Payment Portal</h1>
</header>

<div class="container">

    <div class="info">
        <h3>Payment Instructions</h3>
        <p><b>Amount:</b> K50</p>
        <p><b>Airtel Money Number:</b> 0991744801</p>
        <p><b>TNM Mpamba Number:</b> 0881744801</p>
        <p><b>Reference:</b> Your Registration Number</p>
    </div>

    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="regNumber" placeholder="Registration Number">
    <input type="text" id="transactionId" placeholder="Transaction message">

    <button onclick="submitPayment()">Submit Payment</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 YOUR REAL FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyASE0IKRHGqjHdxOxBovD4n5FqDm_KAukA",
  authDomain: "nalikule-college-books.firebaseapp.com",
  projectId: "nalikule-college-books",
  storageBucket: "nalikule-college-books.appspot.com",
  messagingSenderId: "726295406083",
  appId: "1:726295406083:web:d0b732575478cbf66a1036"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🚀 SUBMIT PAYMENT FUNCTION
function submitPayment() {

    let name = document.getElementById("name").value.trim();
    let regNumber = document.getElementById("regNumber").value.trim();
    let transactionId = document.getElementById("transactionId").value.trim().toUpperCase();

    if (!name || !regNumber || !transactionId) {
        alert("Please fill all fields");
        return;
    }

    let now = new Date();
    let expiry = new Date(now.getTime() + (12 * 60 * 60 * 1000));

    db.collection("payments").doc(transactionId).set({
        name: name,
        regNumber: regNumber,
        transactionId: transactionId,
        status: "pending",
        access: "grace",
        createdAt: now,
        expiresAt: expiry
    })
    .then(() => {
        alert("✅ Payment submitted successfully!");
        window.location.href = "materials.html";
    })
    .catch((error) => {
        alert("❌ Transaction ID already used or invalid");
    });
}

</script>

</body>
</html>
