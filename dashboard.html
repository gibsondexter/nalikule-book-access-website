<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Nalikule Books</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    width: 90%;
    max-width: 700px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    background: #3498db;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #2980b9;
}

h2 {
    text-align: center;
}
</style>
</head>

<body>

<header>
    <h1>Student Dashboard</h1>
</header>

<div class="container">

    <h2 id="welcomeText">Welcome Student</h2>

    <label>Choose Program</label>
    <select id="program">
        <option>MAT/COM</option>
        <option>MAT/BIO</option>
        <option>MAT/PHY</option>
        <option>ENG/LAL</option>
        <option>AGR/BIO</option>
        <option>AGR/HEC</option>
        <option>MAT/AGR</option>
        <option>MAT/HEC</option>
        <option>MAT/CHEM</option>
    </select>

    <label>Choose Year</label>
    <select id="year">
        <option>Year 1</option>
        <option>Year 2</option>
        <option>Year 3</option>
        <option>Year 4</option>
    </select>

    <label>Choose Semester</label>
    <select id="semester">
        <option>Semester 1</option>
        <option>Semester 2</option>
    </select>

    <button onclick="loadMaterials()">View Materials</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>

// Firebase config (same as index page)
const firebaseConfig = {
    aapiKey: "AIzaSyASE0IKRHGqjHdxOxBovD4n5FqDm_KAukA",
  authDomain: "nalikule-college-books.firebaseapp.com",
  projectId: "nalikule-college-books",
  storageBucket: "nalikule-college-books.appspot.com",
  messagingSenderId: "726295406083",
  appId: "1:726295406083:web:d0b732575478cbf66a1036"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


// CHECK LOGIN USER
auth.onAuthStateChanged(user => {
    if (user) {
        db.collection("students").doc(user.uid).get()
        .then(doc => {
            if (doc.exists) {
                let data = doc.data();
                document.getElementById("welcomeText").innerText =
                    "Welcome " + data.firstName + " " + data.lastName;
            }
        });
    } else {
        window.location.href = "index.html";
    }
});


// LOAD MATERIALS (NEXT PAGE CONNECTION)
function loadMaterials() {

    let program = document.getElementById("program").value;
    let year = document.getElementById("year").value;
    let semester = document.getElementById("semester").value;

    // store selection temporarily
    localStorage.setItem("program", program);
    localStorage.setItem("year", year);
    localStorage.setItem("semester", semester);

    // go to materials page
    window.location.href = "payment.html";
}

</script>

</body>
</html>
