<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
}

.container {
    width: 90%;
    max-width: 400px;
    margin: 100px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    background: #2c3e50;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="container">

<h2>Admin Login</h2>

<input type="text" id="email" placeholder="Admin Email">
<input type="password" id="password" placeholder="Password">

<button onclick="loginAdmin()">Login</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyASE0IKRHGqjHdxOxBovD4n5FqDm_KAukA",
    authDomain: "nalikule-college-books.firebaseapp.com",
    projectId: "nalikule-college-books",
    storageBucket: "nalikule-college-books.appspot.com",
    messagingSenderId: "726295406083",
    appId: "1:726295406083:web:eaf13bfb0bfe59316a1036"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🔐 YOUR ADMIN EMAIL (ONLY YOU)
const ADMIN_EMAIL = "gibsondexter34@gmail.com";

function loginAdmin() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(user => {

        if (email === ADMIN_EMAIL) {
            alert("Admin login successful");
            window.location.href = "upload.html";
        } else {
            alert("You are not authorized as admin!");
            auth.signOut();
        }

    })
    .catch(err => {
        alert(err.message);
    });
}

</script>

</body>
</html>
