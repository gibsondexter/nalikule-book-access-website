<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student books access</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

header {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    width: 90%;
    max-width: 500px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    color: white;
    cursor: pointer;
}

.login-btn {
    background: #3498db;
}

.register-btn {
    background: #27ae60;
}

.toggle {
    text-align: center;
    margin-top: 10px;
    cursor: pointer;
    color: blue;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<header>
    <h1>Nalikule books access System <br
            By Dexter
        
    </h1>
</header>

<!-- LOGIN -->
<div class="container" id="loginForm">

    <h2>Login</h2>

    <input type="text" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">

    <button class="login-btn" onclick="login()">Login</button>

    <p class="toggle" onclick="showRegister()">Don't have an account? Register</p>

</div>

<!-- REGISTER -->
<div class="container hidden" id="registerForm">

    <h2>Register</h2>

    <input type="text" id="firstName" placeholder="First Name">
    <input type="text" id="middleName" placeholder="Middle Name">
    <input type="text" id="lastName" placeholder="Last Name">

    <input type="text" id="regNumber" placeholder="Registration Number">
    <input type="text" id="institution" placeholder="College / University">
    <input type="date" id="dob">

    <input type="text" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button class="register-btn" onclick="register()">Create Account</button>

    <p class="toggle" onclick="showLogin()">Already have an account? Login</p>

</div>

<!-- FIREBASE COMPAT SDK (IMPORTANT FIX) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyASE0IKRHGqjHdxOxBovD4n5FqDm_KAukA",
    authDomain: "nalikule-college-books.firebaseapp.com",
    projectId: "nalikule-college-books",
    storageBucket: "nalikule-college-books.appspot.com",
    messagingSenderId: "726295406083",
    appId: "1:726295406083:web:eaf13bfb0bfe59316a1036"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

console.log("🔥 Firebase connected");

// =====================
// SWITCH FORMS
// =====================
function showRegister() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.remove("hidden");
}

function showLogin() {
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}

// =====================
// REGISTER USER
// =====================
function register() {

    let firstName = document.getElementById("firstName").value;
    let middleName = document.getElementById("middleName").value;
    let lastName = document.getElementById("lastName").value;
    let regNumber = document.getElementById("regNumber").value;
    let institution = document.getElementById("institution").value;
    let dob = document.getElementById("dob").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if (!email || !password || !regNumber) {
        alert("Please fill all required fields");
        return;
    }

    auth.createUserWithEmailAndPassword(email, password)
    .then(userCredential => {

        let user = userCredential.user;

        return db.collection("students").doc(user.uid).set({
            firstName,
            middleName,
            lastName,
            regNumber,
            institution,
            dob,
            email
        });

    })
    .then(() => {
        alert("Account created successfully!");
        showLogin();
    })
    .catch(error => {
        alert(error.message);
    });
}

// =====================
// LOGIN USER
// =====================
function login() {

    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    auth.signInWithEmailAndPassword(email, password)
    .then((userCredential) => {

        let user = userCredential.user;

        // 👇 ADMIN CHECK
        if (user.email === "gibsondexter34@gmail.com") {

            alert("Welcome Admin");
            window.location.href = "admin.html";

        } else {

            alert("Login successful");
            window.location.href = "dashboard.html";
        }

    })
    .catch((error) => {
        alert(error.message);
    });
}
</script>

</body>
</html>
