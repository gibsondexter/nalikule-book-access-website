<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Primary Admin Upload</title>

<style>
body { font-family: Arial; background:#f4f6f9; }

.container {
    width:90%;
    max-width:600px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input, select, button {
    width:100%;
    padding:10px;
    margin:10px 0;
}

button {
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

#status {
    text-align:center;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Primary School Material Upload</h2>

<!-- STD SELECT -->
<select id="std">
    <option>Std 1</option>
    <option>Std 2</option>
    <option>Std 3</option>
    <option>Std 4</option>
    <option>Std 5</option>
    <option>Std 6</option>
    <option>Std 7</option>
    <option>Std 8</option>
</select>

<!-- MATERIAL NAME -->
<input type="text" id="title" placeholder="Material Name">

<!-- FILE UPLOAD -->
<input type="file" id="file">

<!-- LINK -->
<input type="text" id="link" placeholder="Paste Google Drive Link">

<button onclick="upload()">Upload Material</button>

<p id="status"></p>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

function upload() {

    let std = document.getElementById("std").value;
    let title = document.getElementById("title").value.trim();
    let file = document.getElementById("file").files[0];
    let link = document.getElementById("link").value.trim();
    let status = document.getElementById("status");

    if (!title) {
        alert("Enter material name!");
        return;
    }

    document.querySelector("button").disabled = true;

    // ================= FILE =================
    if (file) {

        let fileName = Date.now() + "_" + file.name;
        let storageRef = storage.ref("primary/" + std + "/" + fileName);

        let uploadTask = storageRef.put(file);

        uploadTask.on("state_changed",

            function(snapshot) {
                let progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                status.innerHTML = "Uploading: " + progress.toFixed(0) + "%";
            },

            function(error) {
                status.innerHTML = "❌ Upload failed!";
                alert(error.message);
                document.querySelector("button").disabled = false;
            },

            function() {
                uploadTask.snapshot.ref.getDownloadURL().then(function(url) {

                    saveData(std, title, url);

                });
            }
        );

    }

    // ================= LINK =================
    else if (link) {
        saveData(std, title, link);
    }

    else {
        alert("Upload file or paste link!");
        document.querySelector("button").disabled = false;
    }
}

// SAVE TO FIREBASE
function saveData(std, title, link) {

    let status = document.getElementById("status");

    db.collection("primary_materials").add({
        std: std,
        title: title,
        link: link,
        createdAt: new Date()
    })
    .then(() => {

        status.innerHTML = "✅ Upload successful!";

        document.getElementById("title").value = "";
        document.getElementById("file").value = "";
        document.getElementById("link").value = "";

        document.querySelector("button").disabled = false;

    })
    .catch(err => {
        status.innerHTML = "❌ Failed!";
        alert(err.message);
        document.querySelector("button").disabled = false;
    });
}

</script>

</body>
</html>
