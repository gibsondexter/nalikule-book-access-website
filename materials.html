<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materials</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    width: 90%;
    max-width: 800px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    text-align: center;
}

.material {
    padding: 15px;
    margin: 10px 0;
    background: #f1f3f6;
    border-left: 5px solid #3498db;
    border-radius: 8px;
}

a {
    text-decoration: none;
    color: #2980b9;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>Course Materials</h1>
</header>

<div class="container">

    <h2 id="title"></h2>

    <div id="materialsList"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyASE0IKRHGqjHdxOxBovD4n5FqDm_KAukA",
    authDomain: "nalikule-college-books.firebaseapp.com",
    projectId: "nalikule-college-books",
    storageBucket: "nalikule-college-books.appspot.com",
    messagingSenderId: "726295406083",
    appId: "1:726295406083:web:eaf13bfb0bfe59316a1036"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 📥 GET USER SELECTION
let program = localStorage.getItem("program");
let year = localStorage.getItem("year");
let semester = localStorage.getItem("semester");

// 🧠 SHOW TITLE
document.getElementById("title").innerText =
`📚 ${program} | ${year} | ${semester}`;

    function checkAccessAndLoad() {

    let regNumber = localStorage.getItem("regNumber");

    if (!regNumber) {
        alert("No user found. Please login again.");
        window.location.href = "index.html";
        return;
    }

    db.collection("payments")
    .where("regNumber", "==", regNumber)
    .orderBy("createdAt", "desc")
    .limit(1)
    .get()
    .then(snapshot => {

        if (snapshot.empty) {
            alert("No payment found. Please pay first.");
            window.location.href = "payment.html";
            return;
        }

        let data = snapshot.docs[0].data();

        let now = new Date();

        // ❌ REJECTED
        if (data.status === "rejected") {
            alert("Payment rejected. Please try again.");
            window.location.href = "payment.html";
            return;
        }

        // ⏳ PENDING
        else if (data.status !== "approved") {
            alert("Payment pending approval.");
            window.location.href = "payment.html";
            return;
        }

        // ⏳ EXPIRED CHECK
        let expiry = data.expiresAt.toDate();

        if (now > expiry) {
            alert("Access expired. Please renew payment.");
            window.location.href = "payment.html";
            return;
        }

        // ✔ APPROVED → LOAD MATERIALS
        loadMaterials();

    });

}

// 📦 LOAD MATERIALS
function loadMaterials() {

    let container = document.getElementById("materialsList");

    // Loading message
    container.innerHTML = "<p>⏳ Loading materials...</p>";

    db.collection("materials")
    .where("program", "==", program)
    .where("year", "==", year)
    .where("semester", "==", semester)
    .get()
    .then(snapshot => {

        container.innerHTML = "";

        if (snapshot.empty) {
            container.innerHTML = "<p>❌ No materials found.</p>";
            return;
        }

        snapshot.forEach(doc => {

            let data = doc.data();

            // Detect file type
            let icon = "📄";

            if (data.link.includes(".pdf")) icon = "📕";
            else if (data.link.includes(".ppt") || data.link.includes(".pptx")) icon = "📊";
            else if (data.link.includes(".jpg") || data.link.includes(".png")) icon = "🖼️";

            let div = document.createElement("div");
            div.className = "material";

            div.innerHTML = `
                <strong>${icon} ${data.title}</strong><br>
                <a href="${data.link}" target="_blank">Open / Download</a>
            `;

            container.appendChild(div);

        });

    })
    .catch(error => {
        container.innerHTML = "<p>⚠ Error loading materials</p>";
        console.log(error);
    });
}

// 🚀 RUN
loadMaterials();

</script>

</body>
</html>
